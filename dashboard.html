<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../asset/style.css">
</head>
<body>

    <h1 style="text-align: center;">نظام ndax للـ POS</h1>

    <!-- شاشة التحكم -->
    <fieldset style="border: 2px solid #333; border-radius: 10px; margin-bottom: 20px; padding: 15px;">
        <legend>📊 شاشة التحكم</legend>
        <p>مرحباً بك في لوحة تحكم النظام.</p>
        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px;">
            إجمالي مبيعات اليوم: 0.00 جنيه | عدد العمليات: 0
        </div>
    </fieldset>

    <!-- شاشة المبيعات -->
    <fieldset style="border: 2px solid #28a745; border-radius: 10px; padding: 15px;">
        <legend>🛒 شاشة المبيعات</legend>
        <label>اسم المنتج: </label>
        <input type="text" placeholder="أدخل اسم المنتج"><br><br>
        
        <label>السعر: </label>
        <input type="number" placeholder="0.00"><br><br>
        
        <button style="background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px;">
            إضافة الفاتورة
        </button>
    </fieldset>

</body>
</html>
